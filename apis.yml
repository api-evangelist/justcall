aid: justcall
name: JustCall
description: >-
  JustCall is a cloud-based phone system and contact center platform that
  provides voice calling, SMS/MMS messaging, IVR, call analytics, and contact
  management for small and mid-sized businesses. The platform integrates with
  CRMs, helpdesks, and automation tools. JustCall exposes REST APIs and
  webhooks for programmatically managing calls, SMS, contacts, phone numbers,
  and call dispositions, authenticated via API key plus API secret in headers.
