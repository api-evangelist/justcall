apis:
  - aid: justcall:rest-api
    name: JustCall REST API
    description: >-
      REST API for placing calls, sending SMS and MMS messages, managing
      contacts, phone numbers, users, and call dispositions in JustCall.
      Authentication uses an API key and API secret passed in the
      Authorization header. Webhooks notify on completed calls and SMS events.
    humanURL: https://developer.justcall.io/docs/overview
